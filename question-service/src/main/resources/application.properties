spring.application.name=question-service
server.port=8777
#server.servlet.context-path=/question
# MySQL Database Connection
spring.datasource.url=jdbc:mysql://localhost:3306/questiondb?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
# JPA (Hibernate) Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
#http://localhost:8777/question/swagger-ui/index.html
eureka.instance.lease-renewal-interval-in-seconds=30
eureka.instance.lease-expiration-duration-in-seconds=90
eureka.client.service-url.defaultZone=http://localhost:7777/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
