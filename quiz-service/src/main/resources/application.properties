spring.application.name=quiz-service
server.port=8787
#server.servlet.context-path=/quiz

# MySQL Database Connection
spring.datasource.url=jdbc:mysql://localhost:3306/quizdb?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root

# JPA (Hibernate) Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
#http://localhost:8777/question/swagger-ui/index.html


# Eureka Client Configuration
eureka.client.service-url.defaultZone=http://localhost:7777/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# Gateway Routes Configuration
spring.cloud.gateway.routes[0].id=quiz-service
spring.cloud.gateway.routes[0].uri=lb://QUIZ-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/QUIZ-SERVICE/**
spring.cloud.gateway.routes[0].filters[0]=RewritePath=/QUIZ-SERVICE/(?<segment>.*), /${segment}

spring.cloud.gateway.routes[1].id=question-service
spring.cloud.gateway.routes[1].uri=lb://QUESTION-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/QUESTION-SERVICE/**
#spring.cloud.gateway.routes[1].filters[0]=RewritePath=/QUESTION-SERVICE/(?<segment>.*), /${segment}

# Logging Level
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.org.springframework.web=DEBUG



